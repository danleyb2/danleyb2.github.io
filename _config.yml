# Welcome to Jekyll!
#
# Site settings
title: Brian Nyaundi - Full-Stack Developer & DevOps Engineer
email: contact@danleyb2.dev
description: >-
  Software developer specializing in Python, JavaScript, Docker, and system reliability.
  Currently building Vision AI integrations at PlateRecognizer.
baseurl: ""
url: "https://danleyb2.dev"
twitter_username: danleyb2
github_username: danleyb2

header_pages:
  - blog.html
  - projects.html
  - experiences.html
  - about.html

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-avatar

exclude:
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/

collections:
  projects:
    output: true
    sort_by: date
    sort_direction: reverse
  experiences:
    output: true
  educations:
    output: true
    sort_by: date
    sort_direction: reverse

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: experiences
    values:
      layout: experience
  - scope:
      path: ""
      type: educations
    values:
      layout: default2

# SEO & Social
jekyll_seo_tag:
  twitter:
    username: danleyb2
  image: /assets/images/me.jpg
  description: "Software developer specializing in Python, JavaScript, Docker, and system reliability."

minima:
  skin: auto
social:
  name: Brian Nyaundi
  links:
    - https://github.com/danleyb2
    - https://www.linkedin.com/in/danleyb2/
    - https://danleyb2.dev
