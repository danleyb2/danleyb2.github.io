# Build settings
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-avatar

exclude:
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/

collections:
  projects:
    output: true
    sort_by: date
    sort_direction: reverse
  experiences:
    output: true
  educations:
    output: true
    sort_by: date
    sort_direction: reverse

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: experiences
    values:
      layout: experience
  - scope:
      path: ""
      type: educations
    values:
      layout: default2


minima:
  skin: auto
social:
